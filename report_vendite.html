<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Report Vendite — PhoenixFuel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 11px; color: #000; background: #f5f4f0; }

  .filtri-panel { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 24px; margin: 20px auto; max-width: 800px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .filtri-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .filtri-title { font-size: 20px; font-weight: bold; color: #D4A017; }
  .filtri-logo { max-height: 50px; }
  .filtri-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  .filtri-group { display: flex; flex-direction: column; gap: 5px; }
  .filtri-group label { font-size: 11px; color: #666; font-weight: bold; text-transform: uppercase; letter-spacing: 0.4px; }
  .filtri-group select, .filtri-group input { padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fafaf8; color: #1a1a18; }
  .filtri-btn { background: #D4A017; color: #fff; border: none; padding: 12px 28px; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; width: 100%; }

  .report-container { display: none; }

  .page { width: 210mm; min-height: 297mm; padding: 14mm 12mm 20mm; margin: 10px auto; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.08); position: relative; page-break-after: always; }
  .page:last-child { page-break-after: auto; }
  .page-number { position: absolute; bottom: 8mm; right: 12mm; font-size: 9px; color: #aaa; }
  .page-header-mini { font-size: 8px; color: #aaa; margin-bottom: 8px; display: flex; justify-content: space-between; border-bottom: 0.5px solid #eee; padding-bottom: 4px; }

  @media print {
    .no-print { display: none !important; }
    .page { margin: 0; box-shadow: none; }
    body { background: #fff; }
    @page { size: portrait; margin: 6mm; }
  }

  .report-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #D4A017; padding-bottom: 10px; margin-bottom: 12px; }
  .report-title { font-size: 20px; font-weight: bold; color: #D4A017; }
  .report-sub { font-size: 10px; color: #666; margin-top: 3px; }
  .report-logo { max-height: 45px; }
  .report-filtri-info { background: #fafaf8; border: 1px solid #e8e8e8; border-radius: 6px; padding: 8px 12px; margin-bottom: 10px; font-size: 10px; color: #555; display: flex; flex-wrap: wrap; gap: 12px; }
  .report-filtri-info strong { color: #1a1a18; }

  .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 12px; }
  .kpi-box { background: #fafaf8; border: 1px solid #e8e8e8; border-radius: 6px; padding: 8px 4px; text-align: center; }
  .kpi-label { font-size: 7px; color: #999; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
  .kpi-val { font-size: 14px; font-weight: bold; font-family: 'Courier New', monospace; color: #1a1a18; }

  .section-title { font-size: 10px; font-weight: bold; color: #D4A017; text-transform: uppercase; letter-spacing: 0.5px; margin: 10px 0 5px; border-bottom: 1px solid #e8e8e8; padding-bottom: 3px; }

  table { width: 100%; border-collapse: collapse; font-size: 8px; margin-bottom: 8px; }
  th { background: #f5f5f5; padding: 3px 2px; text-align: left; font-size: 7px; text-transform: uppercase; letter-spacing: 0.3px; color: #666; border: 1px solid #ddd; }
  td { padding: 3px 2px; border: 1px solid #eee; font-size: 8px; }
  td.mono { font-family: 'Courier New', monospace; font-weight: bold; text-align: right; font-size: 8px; }
  tr.totale { background: #FDF3D0; font-weight: bold; }
  tr.totale td { border-top: 2px solid #D4A017; font-size: 9px; }

  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .chart-box { background: #fafaf8; border: 1px solid #e8e8e8; border-radius: 6px; padding: 10px; }
  .chart-title { font-size: 10px; font-weight: bold; color: #333; margin-bottom: 6px; }

  .report-footer { position: absolute; bottom: 12mm; left: 12mm; right: 12mm; text-align: center; font-size: 8px; color: #aaa; border-top: 0.5px solid #e8e8e8; padding-top: 4px; }
  .toolbar { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 8px; z-index: 100; }
  .toolbar button { border: none; padding: 10px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: bold; }
  .btn-print { background: #D4A017; color: #fff; }
  .btn-excel { background: #639922; color: #fff; }
  .btn-back { background: #666; color: #fff; }
</style>
</head>
<body>

<!-- FILTRI -->
<div class="filtri-panel no-print" id="filtri-panel">
  <div class="filtri-header">
    <div class="filtri-title">Report Dettaglio Vendite</div>
    <img src="logo_png.jpeg" class="filtri-logo" onerror="this.style.display='none'" />
  </div>
  <div class="filtri-grid">
    <div class="filtri-group"><label>Da</label><input type="date" id="f-da" /></div>
    <div class="filtri-group"><label>A</label><input type="date" id="f-a" /></div>
    <div class="filtri-group"><label>Fornitore</label><select id="f-fornitore"><option value="">Tutti</option></select></div>
    <div class="filtri-group"><label>Prodotto</label><select id="f-prodotto"><option value="">Tutti</option><option>Gasolio Autotrazione</option><option>Benzina</option><option>Gasolio Agricolo</option><option>HVO</option></select></div>
    <div class="filtri-group" style="grid-column:1/-1"><label>Cliente</label><select id="f-cliente"><option value="">Tutti i clienti</option></select></div>
  </div>
  <button class="filtri-btn" onclick="generaReport()">Genera Report</button>
</div>

<!-- REPORT -->
<div class="report-container" id="report-container">
  <div class="toolbar no-print">
    <button class="btn-back" onclick="tornaFiltri()">&#8592; Modifica filtri</button>
    <button class="btn-excel" onclick="esportaExcel()">Esporta Excel</button>
    <button class="btn-print" onclick="window.print()">Stampa / Salva PDF</button>
  </div>
  <div id="report-pages"></div>
</div>

<script>
var SUPABASE_URL='https://jpugeakgpitbxdswbucj.supabase.co';
var SUPABASE_KEY='sb_publishable_xMFZND8_vBl5Z5eEA-2guA_kVME1Iz-';
var sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var oggi=new Date().toISOString().split('T')[0];
document.getElementById('f-da').value=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().split('T')[0];
document.getElementById('f-a').value=oggi;

function fmt(n){return '€ '+Number(n).toLocaleString('it-IT',{minimumFractionDigits:4,maximumFractionDigits:4});}
function fmtE(n){var v=Number(n);var d=v%1===0?0:2;return '€ '+v.toLocaleString('it-IT',{minimumFractionDigits:d,maximumFractionDigits:2});}
function fmtL(n){return Number(n).toLocaleString('it-IT',{minimumFractionDigits:0,maximumFractionDigits:0});}
function esc(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function prezzoNoIva(r){return Number(r.costo_litro)+Number(r.trasporto_litro)+Number(r.margine);}
function prezzoConIva(r){return prezzoNoIva(r)*(1+Number(r.iva)/100);}
var COLORI=['#D4A017','#378ADD','#639922','#3B6D11','#D85A30','#6B5FCC','#BA7517','#E24B4A','#085041','#791F1F'];

async function caricaFiltri(){
  var r1=await sb.from('fornitori').select('nome').eq('attivo',true).order('nome');
  var selF=document.getElementById('f-fornitore');
  (r1.data||[]).forEach(function(f){selF.innerHTML+='<option value="'+esc(f.nome)+'">'+esc(f.nome)+'</option>';});
  var r2=await sb.from('clienti').select('nome').or('attivo.eq.true,attivo.is.null').order('nome');
  var selC=document.getElementById('f-cliente');
  (r2.data||[]).forEach(function(c){selC.innerHTML+='<option value="'+esc(c.nome)+'">'+esc(c.nome)+'</option>';});
}
caricaFiltri();

async function generaReport(){
  var da=document.getElementById('f-da').value, a=document.getElementById('f-a').value;
  var fornitore=document.getElementById('f-fornitore').value;
  var prodotto=document.getElementById('f-prodotto').value;
  var cliente=document.getElementById('f-cliente').value;
  if(!da||!a){alert('Seleziona le date');return;}

  var allOrdini=[],from=0;
  while(true){
    var q=sb.from('ordini').select('*').gte('data',da).lte('data',a).neq('stato','annullato').neq('tipo_ordine','deposito');
    if(fornitore)q=q.eq('fornitore',fornitore);
    if(prodotto)q=q.eq('prodotto',prodotto);
    if(cliente)q=q.eq('cliente',cliente);
    var res=await q.order('data').order('cliente').range(from,from+999);
    if(!res.data||!res.data.length)break;
    allOrdini=allOrdini.concat(res.data);
    if(res.data.length<1000)break;
    from+=1000;
  }
  if(!allOrdini.length){alert('Nessun ordine trovato');return;}

  var periodoTxt=new Date(da).toLocaleDateString('it-IT')+' - '+new Date(a).toLocaleDateString('it-IT');
  var genDate=new Date().toLocaleDateString('it-IT');

  // Calcoli
  var fattNetto=0,fattIva=0,litri=0,margine=0;
  var perCliente={},perFornitore={},perProdotto={},perGiorno={};

  allOrdini.forEach(function(r){
    var l=Number(r.litri),netto=prezzoNoIva(r)*l,iva=prezzoConIva(r)*l,marg=Number(r.margine)*l;
    fattNetto+=netto;fattIva+=iva;litri+=l;margine+=marg;

    var cl=r.cliente||'—';
    if(!perCliente[cl])perCliente[cl]={ordini:0,litri:0,fattNetto:0,fattIva:0,margine:0};
    perCliente[cl].ordini++;perCliente[cl].litri+=l;perCliente[cl].fattNetto+=netto;perCliente[cl].fattIva+=iva;perCliente[cl].margine+=marg;

    var fo=r.fornitore||'—';
    if(!perFornitore[fo])perFornitore[fo]={ordini:0,litri:0,fattNetto:0,fattIva:0,margine:0};
    perFornitore[fo].ordini++;perFornitore[fo].litri+=l;perFornitore[fo].fattNetto+=netto;perFornitore[fo].fattIva+=iva;perFornitore[fo].margine+=marg;

    var pr=r.prodotto||'—';
    if(!perProdotto[pr])perProdotto[pr]={litri:0,fattIva:0};
    perProdotto[pr].litri+=l;perProdotto[pr].fattIva+=iva;

    if(!perGiorno[r.data])perGiorno[r.data]={fattIva:0,margine:0};
    perGiorno[r.data].fattIva+=iva;perGiorno[r.data].margine+=marg;
  });

  var clArr=Object.entries(perCliente).sort(function(a,b){return b[1].fattIva-a[1].fattIva;});
  var foArr=Object.entries(perFornitore).sort(function(a,b){return b[1].fattIva-a[1].fattIva;});
  var prArr=Object.entries(perProdotto);
  var prodColori={'Gasolio Autotrazione':'#D4A017','Benzina':'#378ADD','Gasolio Agricolo':'#639922','HVO':'#3B6D11'};

  var filtriInfo='<span>Periodo: <strong>'+periodoTxt+'</strong></span>';
  if(fornitore)filtriInfo+='<span>Fornitore: <strong>'+esc(fornitore)+'</strong></span>';
  if(prodotto)filtriInfo+='<span>Prodotto: <strong>'+esc(prodotto)+'</strong></span>';
  if(cliente)filtriInfo+='<span>Cliente: <strong>'+esc(cliente)+'</strong></span>';

  // === PAGINA 1: KPI + Riepilogo clienti + Riepilogo fornitori ===
  var p1='<div class="report-header"><div><div class="report-title">REPORT VENDITE</div><div class="report-sub">'+periodoTxt+'</div><div class="report-sub">PhoenixFuel Srl</div></div><img src="logo_png.jpeg" class="report-logo" onerror="this.style.display=\'none\'" /></div>';
  p1+='<div class="report-filtri-info">'+filtriInfo+'</div>';
  p1+='<div class="kpi-grid">';
  p1+='<div class="kpi-box"><div class="kpi-label">Fatt. netto</div><div class="kpi-val">'+fmtE(fattNetto)+'</div></div>';
  p1+='<div class="kpi-box"><div class="kpi-label">Fatt. IVA incl.</div><div class="kpi-val">'+fmtE(fattIva)+'</div></div>';
  p1+='<div class="kpi-box"><div class="kpi-label">Litri</div><div class="kpi-val">'+fmtL(litri)+'</div></div>';
  p1+='<div class="kpi-box"><div class="kpi-label">Margine</div><div class="kpi-val" style="color:#639922">'+fmtE(margine)+'</div></div>';
  p1+='<div class="kpi-box"><div class="kpi-label">Ordini</div><div class="kpi-val">'+allOrdini.length+'</div></div></div>';

  p1+='<div class="section-title">Riepilogo per cliente</div><table><thead><tr><th>Cliente</th><th>Ordini</th><th>Litri</th><th>Fatt. netto</th><th>Fatt. IVA incl.</th><th>Margine</th></tr></thead><tbody>';
  clArr.forEach(function(x){var c=x[0],v=x[1];p1+='<tr><td><strong>'+esc(c)+'</strong></td><td class="mono">'+v.ordini+'</td><td class="mono">'+fmtL(v.litri)+'</td><td class="mono">'+fmtE(v.fattNetto)+'</td><td class="mono">'+fmtE(v.fattIva)+'</td><td class="mono">'+fmtE(v.margine)+'</td></tr>';});
  p1+='<tr class="totale"><td><strong>TOTALE</strong></td><td class="mono">'+allOrdini.length+'</td><td class="mono">'+fmtL(litri)+'</td><td class="mono">'+fmtE(fattNetto)+'</td><td class="mono">'+fmtE(fattIva)+'</td><td class="mono">'+fmtE(margine)+'</td></tr></tbody></table>';

  p1+='<div class="section-title">Riepilogo per fornitore</div><table><thead><tr><th>Fornitore</th><th>Ordini</th><th>Litri</th><th>Fatt. netto</th><th>Fatt. IVA incl.</th><th>Margine</th></tr></thead><tbody>';
  foArr.forEach(function(x){var f=x[0],v=x[1];p1+='<tr><td><strong>'+esc(f)+'</strong></td><td class="mono">'+v.ordini+'</td><td class="mono">'+fmtL(v.litri)+'</td><td class="mono">'+fmtE(v.fattNetto)+'</td><td class="mono">'+fmtE(v.fattIva)+'</td><td class="mono">'+fmtE(v.margine)+'</td></tr>';});
  p1+='<tr class="totale"><td><strong>TOTALE</strong></td><td class="mono">'+allOrdini.length+'</td><td class="mono">'+fmtL(litri)+'</td><td class="mono">'+fmtE(fattNetto)+'</td><td class="mono">'+fmtE(fattIva)+'</td><td class="mono">'+fmtE(margine)+'</td></tr></tbody></table>';

  // === PAGINA 2: Grafici ===
  var p2='<div class="section-title">Analisi grafica</div>';
  p2+='<div class="charts-grid" style="margin-bottom:12px"><div class="chart-box"><div class="chart-title">Vendite per giorno (IVA incl.)</div><canvas id="r-chart-giorno" height="170"></canvas></div>';
  p2+='<div class="chart-box"><div class="chart-title">Margine per giorno</div><canvas id="r-chart-margine" height="170"></canvas></div></div>';
  p2+='<div class="charts-grid"><div class="chart-box"><div class="chart-title">Top 10 clienti</div><canvas id="r-chart-clienti" height="170"></canvas></div>';
  p2+='<div class="chart-box"><div class="chart-title">Vendite per prodotto</div><canvas id="r-chart-prodotti" height="170"></canvas></div></div>';

  // === PAGINE 3+: Dettaglio ordini paginati ===
  var RPP=35;
  var detailPages=[];
  var thRow='<thead><tr><th>#</th><th>Data</th><th>Cliente</th><th>Prodotto</th><th>Litri</th><th>P/L netto</th><th>Tot. netto</th><th>IVA</th><th>Tot. IVA</th><th>Margine</th><th>Fornitore</th></tr></thead>';
  var tL=0,tN=0,tI=0,tM=0;

  for(var i=0;i<allOrdini.length;i+=RPP){
    var chunk=allOrdini.slice(i,i+RPP);
    var isLast=(i+RPP)>=allOrdini.length;
    var dp=(i===0?'<div class="section-title">Dettaglio ordini</div>':'');
    dp+='<table>'+thRow+'<tbody>';
    chunk.forEach(function(r,idx){
      var l=Number(r.litri),pN=prezzoNoIva(r),pI=prezzoConIva(r);
      var netto=pN*l,iva=pI*l,marg=Number(r.margine)*l;
      tL+=l;tN+=netto;tI+=iva;tM+=marg;
      dp+='<tr><td>'+(i+idx+1)+'</td><td>'+r.data+'</td><td>'+esc(r.cliente)+'</td><td>'+esc(r.prodotto)+'</td><td class="mono">'+fmtL(r.litri)+'</td><td class="mono">'+fmt(pN)+'</td><td class="mono">'+fmtE(netto)+'</td><td>'+r.iva+'%</td><td class="mono" style="font-weight:bold">'+fmtE(iva)+'</td><td class="mono">'+fmtE(marg)+'</td><td>'+esc(r.fornitore)+'</td></tr>';
    });
    if(isLast){dp+='<tr class="totale"><td colspan="4"><strong>TOTALI</strong></td><td class="mono">'+fmtL(tL)+'</td><td></td><td class="mono">'+fmtE(tN)+'</td><td></td><td class="mono" style="font-weight:bold">'+fmtE(tI)+'</td><td class="mono">'+fmtE(tM)+'</td><td></td></tr>';}
    dp+='</tbody></table>';
    detailPages.push(dp);
  }

  var totalPages=2+detailPages.length;
  var footerTxt='PhoenixFuel Srl - Report generato il '+genDate+' - Documento interno';

  function mkMini(pn){return '<div class="page-header-mini"><span>PhoenixFuel Srl - Report Vendite - '+periodoTxt+'</span><span>'+genDate+'</span></div>';}

  // Assembla
  var html='';
  html+='<div class="page">'+mkMini(1)+p1+'<div class="report-footer">'+footerTxt+'</div><div class="page-number">Pagina 1 di '+totalPages+'</div></div>';
  html+='<div class="page">'+mkMini(2)+p2+'<div class="report-footer">'+footerTxt+'</div><div class="page-number">Pagina 2 di '+totalPages+'</div></div>';
  detailPages.forEach(function(dp,idx){
    var pn=3+idx;
    html+='<div class="page">'+mkMini(pn)+dp+'<div class="report-footer">'+footerTxt+'</div><div class="page-number">Pagina '+pn+' di '+totalPages+'</div></div>';
  });

  document.getElementById('report-pages').innerHTML=html;

  // Grafici
  var giorniArr=Object.keys(perGiorno).sort();
  var labelsG=giorniArr.map(function(g){var d=new Date(g);return d.getDate()+'/'+(d.getMonth()+1);});

  new Chart(document.getElementById('r-chart-giorno').getContext('2d'),{
    type:'bar',data:{labels:labelsG,datasets:[{label:'€',data:giorniArr.map(function(g){return Math.round(perGiorno[g].fattIva*100)/100;}),backgroundColor:'#D4A017',borderRadius:4}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return '€'+v}}},x:{ticks:{font:{size:7}}}}}
  });
  new Chart(document.getElementById('r-chart-margine').getContext('2d'),{
    type:'line',data:{labels:labelsG,datasets:[{label:'€',data:giorniArr.map(function(g){return Math.round(perGiorno[g].margine*100)/100;}),borderColor:'#639922',backgroundColor:'rgba(99,153,34,0.1)',fill:true,tension:0.3,pointRadius:2}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return '€'+v}}},x:{ticks:{font:{size:7}}}}}
  });
  var top10=clArr.slice(0,10);
  new Chart(document.getElementById('r-chart-clienti').getContext('2d'),{
    type:'bar',data:{labels:top10.map(function(x){return x[0].length>15?x[0].substring(0,15)+'…':x[0];}),datasets:[{label:'€',data:top10.map(function(x){return Math.round(x[1].fattIva*100)/100;}),backgroundColor:top10.map(function(_,i){return COLORI[i%COLORI.length];}),borderRadius:4}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return '€'+v}}}}}
  });
  new Chart(document.getElementById('r-chart-prodotti').getContext('2d'),{
    type:'doughnut',data:{labels:prArr.map(function(x){return x[0];}),datasets:[{data:prArr.map(function(x){return x[1].fattIva;}),backgroundColor:prArr.map(function(x){return prodColori[x[0]]||'#888';})}]},
    options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:9}}}}}
  });

  document.getElementById('filtri-panel').style.display='none';
  document.getElementById('report-container').style.display='block';
}

function tornaFiltri(){document.getElementById('filtri-panel').style.display='block';document.getElementById('report-container').style.display='none';}

function esportaExcel(){
  var tables=document.querySelectorAll('.page table');
  var html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>Report Vendite</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>';
  var titles=document.querySelectorAll('.section-title');
  var tIdx=0;
  tables.forEach(function(t){if(titles[tIdx]){html+='<h3>'+titles[tIdx].textContent+'</h3>';tIdx++;}html+=t.outerHTML+'<br/>';});
  html+='</body></html>';
  var blob=new Blob([html],{type:'application/vnd.ms-excel;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='report_vendite_'+(document.getElementById('f-da').value||'report')+'.xls';a.click();URL.revokeObjectURL(url);
}
</script>
</body>
</html>
