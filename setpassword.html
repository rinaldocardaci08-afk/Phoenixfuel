<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhoenixFuel — Imposta Password</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="login-logo">
      <span style="font-size:36px">🔥</span>
      <div class="login-title">PhoenixFuel</div>
      <div class="login-sub">Imposta la tua password</div>
    </div>
    <div class="login-card">
      <div id="msg-loading" style="text-align:center;padding:20px;color:var(--text-muted)">Verifica in corso...</div>
      <div id="form-password" style="display:none">
        <div class="form-group" style="margin-bottom:12px">
          <label>Nuova password</label>
          <input type="password" id="new-password" placeholder="Min 6 caratteri" />
        </div>
        <div class="form-group" style="margin-bottom:20px">
          <label>Conferma password</label>
          <input type="password" id="confirm-password" placeholder="Ripeti la password" />
        </div>
        <button class="btn-primary" style="width:100%" onclick="impostaPassword()">Imposta password</button>
        <div id="set-error" style="margin-top:12px;font-size:12px;color:#A32D2D;display:none"></div>
      </div>
      <div id="msg-success" style="display:none;text-align:center;padding:20px">
        <div style="font-size:32px;margin-bottom:12px">✅</div>
        <div style="font-weight:500;margin-bottom:8px">Password impostata!</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">Ora puoi accedere a PhoenixFuel</div>
        <a href="login.html" class="btn-primary" style="display:inline-block;text-decoration:none">Vai al login</a>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://jpugeakgpitbxdswbucj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_xMFZND8_vBl5Z5eEA-2guA_kVME1Iz-';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Gestisce il token dall'URL
    async function init() {
      const hash = window.location.hash;
      const params = new URLSearchParams(hash.replace('#', '?'));
      const accessToken = params.get('access_token');
      const type = params.get('type');

      if (accessToken && (type === 'invite' || type === 'recovery')) {
        const { error } = await sb.auth.setSession({
          access_token: accessToken,
          refresh_token: params.get('refresh_token') || ''
        });
        if (!error) {
          document.getElementById('msg-loading').style.display = 'none';
          document.getElementById('form-password').style.display = 'block';
          return;
        }
      }
      document.getElementById('msg-loading').textContent = 'Link non valido o scaduto. Contatta l\'amministratore.';
    }

    async function impostaPassword() {
      const pwd = document.getElementById('new-password').value;
      const pwd2 = document.getElementById('confirm-password').value;
      const errEl = document.getElementById('set-error');
      errEl.style.display = 'none';
      if (pwd.length < 6) { errEl.textContent = 'La password deve essere di almeno 6 caratteri'; errEl.style.display = 'block'; return; }
      if (pwd !== pwd2) { errEl.textContent = 'Le password non coincidono'; errEl.style.display = 'block'; return; }
      const { error } = await sb.auth.updateUser({ password: pwd });
      if (error) { errEl.textContent = 'Errore: ' + error.message; errEl.style.display = 'block'; return; }
      document.getElementById('form-password').style.display = 'none';
      document.getElementById('msg-success').style.display = 'block';
    }

    init();
  </script>
</body>
</html>
